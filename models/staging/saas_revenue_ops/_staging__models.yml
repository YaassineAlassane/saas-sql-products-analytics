version: 2
description: "{{ doc('staging_overview') }}"
models:
  - name: stg_users
    description: "Cleaned user profiles containing signup dates and geographic locations."
    columns:
      - name: user_id
        description: "Primary key. Unique identifier for each user."
        tests:
          - unique
          - not_null

  - name: stg_subscriptions
    description: "Cleaned subscription contracts tracking plan details and recurring revenue."
    columns:
      - name: user_id
        description: "Primary key for this layer. Unique identifier representing the customer's subscription."
        tests:
          - unique
          - not_null

  - name: stg_events
    description: "Behavioral event logs capturing granular user interactions over time."
    columns:
      - name: user_id
        description: "Foreign key linking to stg_users. Cannot be null."
        tests:
          - not_null
      - name: event_date
        description: "The timestamp of the recorded action."
        tests:
          - not_null