version: 2

sources:
  - name: raw_saas_data
    database: saas-revenue-ops
    schema: raw_layer
    description: 
      Raw dataset containing core tables from our SaaS platform database,
      including user accounts, Stripe subscription states, and application usage logs.

    tables:
      - name: users
        description: "Raw customer profiles and account registration data." 
      - name: subscriptions
        description: "Raw historical data tracking SaaS subscription plans and recurring revenues." 
      - name: events
        description: "Raw event streams capturing user interactions and feature usage inside the product."